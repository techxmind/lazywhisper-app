name: "Release LazyWhisper"

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # For Silicon & Intel Mac
            args: "--target universal-apple-darwin"
          - platform: "windows-latest" # For Windows
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      
      - name: install frontend dependencies
        run: npm ci

      # Tauri 构建 + 自动创建 GitHub Draft Release（含产物上传）
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "LazyWhisper ${{ github.ref_name }}"
          # releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # -----------------------------------------------------------
      # 📦 补充发布：使用 softprops/action-gh-release 确保所有产物
      #    （含更新签名文件）都附加到 GitHub Release
      # -----------------------------------------------------------
      - name: 📦 Publish extra assets to GitHub Releases
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: false
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/updater/*.zip.sig
            src-tauri/target/release/bundle/updater/*.tar.gz.sig

      # -----------------------------------------------------------
      # 🚀 自动接管产物并推送到 Cloudflare R2 (macOS)
      # -----------------------------------------------------------
      - name: 🚀 Upload macOS DMG to Cloudflare R2
        if: matrix.platform == 'macos-latest'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          echo "Scanning for DMG file..."
          # 递归搜索 target 目录下的 dmg，兼容 universal 路径
          DMG_FILE=$(find src-tauri/target -name "*.dmg" | head -n 1)
          echo "Found DMG: $DMG_FILE"
          
          # 强行覆盖上传，永远保持 latest 目录下的文件是最新版
          aws s3 cp "$DMG_FILE" s3://lazywhisper-releases/latest/LazyWhisper-mac.dmg \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

      # -----------------------------------------------------------
      # 🚀 自动接管产物并推送到 Cloudflare R2 (Windows)
      # -----------------------------------------------------------
      - name: 🚀 Upload Windows EXE to Cloudflare R2
        if: matrix.platform == 'windows-latest'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          Write-Host "Scanning for Windows Installer..."
          # 使用 PowerShell 递归搜索 bundle 目录下的 exe 或 msi 安装包
          $INSTALLER = Get-ChildItem -Path "src-tauri\target" -Recurse -Include *.exe,*.msi | Where-Object { $_.FullName -match "bundle" } | Select-Object -First 1
          Write-Host "Found Installer: $($INSTALLER.FullName)"
          
          # 上传并覆盖
          aws s3 cp "$($INSTALLER.FullName)" s3://lazywhisper-releases/latest/LazyWhisper-win.exe `
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com